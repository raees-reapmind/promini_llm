name: Promini APK Build & Distribute

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build & Distribute Promini APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter 3.27.4
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Verify Flutter version
        run: flutter --version 

      - name: Create .env file from GitHub Secrets
        run: |
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> .env

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Rename APK to promini
        run: |
          mkdir -p output
          cp build/app/outputs/flutter-apk/app-release.apk output/promini.apk

      - name: Upload promini.apk as artifact
        uses: actions/upload-artifact@v4
        with:
          name: promini
          path: output/promini.apk
          retention-days: 30

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }} 
          groups: testers
          file: output/promini.apk
          releaseNotes: |
            Build from commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
            Triggered by: ${{ github.actor }}

      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -f .env

      - name: Build info summary
        run: |
          echo "✅ Build completed successfully"
          echo "📦 APK name: promini.apk"
          echo "🔧 Flutter version: 3.27.4"
          echo "🚀 Uploaded to Firebase App Distribution"
          echo "📁 APK size: $(du -sh output/promini.apk | cut -f1)"