name: Promini APK Build & Distribute

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build & Distribute Promini APK
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # ☕ Java setup
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 🐦 Flutter setup
      - name: Set up Flutter 3.27.4
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.27.4
          channel: stable
          cache: true

      # 🔍 Verify
      - name: Verify Flutter version
        run: flutter --version

      # 🔐 Create .env from secrets
      - name: Create .env file
        run: echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" > .env

      # 📦 Install deps
      - name: Install dependencies
        run: flutter pub get

      # 🏗 Build APK
      - name: Build APK (release)
        run: flutter build apk --release

      # 📁 Prepare APK
      - name: Rename APK to promini
        run: |
          mkdir -p output
          cp build/app/outputs/flutter-apk/app-release.apk output/promini.apk

      # 📤 Upload artifact
      - name: Upload promini.apk as artifact
        uses: actions/upload-artifact@v4
        with:
          name: promini
          path: output/promini.apk
          retention-days: 30

      # 🔥 Create Firebase credentials file (SAFE METHOD)
      - name: Create Firebase credentials file
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' > firebase.json

      # 🚀 Upload to Firebase App Distribution
      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFile: firebase.json
          groups: testers
          file: output/promini.apk
          releaseNotes: |
            🚀 Promini Build
            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
            Triggered by: ${{ github.actor }}

      # 🧹 Cleanup
      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -f .env
          rm -f firebase.json

      # 📊 Summary
      - name: Build info summary
        run: |
          echo "✅ Build completed successfully"
          echo "📦 APK: promini.apk"
          echo "🚀 Uploaded to Firebase App Distribution"
          echo "📁 Size: $(du -sh output/promini.apk | cut -f1)"